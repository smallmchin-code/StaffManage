# ===================================================================
# Spring Boot 通用配置 (所有環境共用)
# ===================================================================
spring:
  application:
    name: StaffManage
  profiles:
    active: dev

  Jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Taipei
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB
      resolve-lazily: false
  datasource:
    # 預設改連 master，確保連線能成功建立並順利產生資料表
    url: JDBC:sqlserver://mssql-db:1433;databaseName=master;trustServerCertificate=true
    username: sa
    password: 1qaz@WSX  # 修正：明確填入密碼，不能留空

server:
  servlet:
    context-path: /StaffManage
    encoding:
      charset: UTF-8
      force: true
      enabled: true
  tomcat:
    uri-encoding: UTF-8